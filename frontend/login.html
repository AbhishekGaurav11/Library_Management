<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Biblio Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .tagline {
      color: #888;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-message {
      color: #e74c3c;
      background: #fadbd8;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #27ae60;
      background: #d5f4e6;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .demo-credentials {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 5px;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }

    .demo-credentials strong {
      color: #333;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <div class="logo">📚</div>
      <div class="logo-text">Biblio</div>
      <div class="tagline">Library Management System</div>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Enter username"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Login
      </button>
    </form>

    <div class="demo-credentials">
      <strong>Demo Login (First Time):</strong><br>
      Username: <code>admin</code><br>
      Password: <code>admin123</code><br>
      <br>
      <em>✠ Change password after first login for security.</em>
    </div>
  </div>

  <script>
    const BASE_URL = (() => {
      const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      return isDev ? `${window.location.protocol}//${window.location.hostname}:5000/api` : 
                     `${window.location.origin}/api`;
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');

      // Hide messages
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      // Disable button and show loading
      loginBtn.disabled = true;
      const originalText = loginBtn.textContent;
      loginBtn.innerHTML = '<span class="loading-spinner"></span>Logging in...';

      try {
        const response = await fetch(`${BASE_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        // Show success message
        successMsg.textContent = '✓ Login successful! Redirecting...';
        successMsg.classList.add('show');

        // Store in localStorage and redirect
        localStorage.setItem('adminLogged', 'true');
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 1500);

      } catch (error) {
        errorMsg.textContent = '✕ ' + error.message;
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = originalText;
      }
    });

    // Check if already logged in
    window.addEventListener('load', async () => {
      try {
        const response = await fetch(`${BASE_URL}/auth/current`, {
          method: 'GET',
          credentials: 'include'
        });

        if (response.ok) {
          // Already logged in, redirect to main page
          window.location.href = '/index.html';
        }
      } catch (error) {
        console.log('Not logged in yet');
      }
    });
  </script>
</body>
</html>
